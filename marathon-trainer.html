<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stride – Marathon Training Planner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #e8540a;
      --orange-light: #ff7b39;
      --dark: #0f1117;
      --card: #1a1d27;
      --card2: #22263a;
      --border: #2e3248;
      --text: #e8eaf0;
      --muted: #8b90a8;
      --green: #2ecc71;
      --blue: #3b82f6;
      --purple: #a855f7;
      --red: #ef4444;
      --yellow: #f59e0b;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #0f1117 0%, #1a1d27 100%);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .logo { font-size: 2rem; }
    header h1 { font-size: 1.6rem; font-weight: 700; }
    header h1 span { color: var(--orange); }
    header p { color: var(--muted); font-size: 0.875rem; margin-top: 0.2rem; }

    /* ── Layout ── */
    .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* ── Form Card ── */
    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
    }
    .form-card h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1.5rem; color: var(--orange); text-transform: uppercase; letter-spacing: 0.05em; }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.25rem;
    }

    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.5rem;
    }
    .field input, .field select {
      width: 100%;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      color: var(--text);
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus {
      outline: none;
      border-color: var(--orange);
    }
    .field select option { background: var(--card2); }

    .pace-row { display: flex; gap: 0.5rem; }
    .pace-row input { text-align: center; }
    .pace-sep { display: flex; align-items: center; padding-top: 0.1rem; color: var(--muted); font-size: 1.2rem; font-weight: 300; }

    .btn {
      margin-top: 1.5rem;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.8rem 2.5rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:hover { background: var(--orange-light); }
    .btn:active { transform: scale(0.97); }

    .error-msg { color: #f87171; font-size: 0.85rem; margin-top: 1rem; display: none; }

    /* ── Results ── */
    #results { display: none; }

    .results-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .results-header h2 { font-size: 1.3rem; font-weight: 700; }
    .badge {
      background: var(--orange);
      color: #fff;
      border-radius: 20px;
      padding: 0.2rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 700;
    }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .tab {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 1.1rem;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab:hover { border-color: var(--orange); color: var(--text); }
    .tab.active { background: var(--orange); border-color: var(--orange); color: #fff; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Stats Row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      text-align: center;
    }
    .stat-card .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
    .stat-card .value { font-size: 1.6rem; font-weight: 700; color: var(--orange); }
    .stat-card .unit { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; }

    /* ── Pace Table ── */
    .section-title {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
      margin-top: 1.5rem;
    }

    .pace-table {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .pace-row-item {
      display: flex;
      align-items: center;
      padding: 0.85rem 1.25rem;
      gap: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .pace-row-item:last-child { border-bottom: none; }
    .pace-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .pace-name { flex: 1; font-weight: 600; font-size: 0.95rem; }
    .pace-desc { flex: 2; font-size: 0.8rem; color: var(--muted); }
    .pace-val { font-size: 1rem; font-weight: 700; white-space: nowrap; }

    /* ── HR Zones ── */
    .hr-zone {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 0.75rem;
    }
    .hr-zone-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
    }
    .hr-zone-number {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.875rem;
      flex-shrink: 0;
    }
    .hr-zone-info { flex: 1; }
    .hr-zone-info .zone-name { font-weight: 700; font-size: 0.95rem; }
    .hr-zone-info .zone-desc { font-size: 0.8rem; color: var(--muted); margin-top: 0.1rem; }
    .hr-zone-range { text-align: right; }
    .hr-zone-range .bpm { font-size: 1.1rem; font-weight: 700; }
    .hr-zone-range .pct { font-size: 0.75rem; color: var(--muted); }
    .hr-bar-wrap { padding: 0 1.25rem 1rem; }
    .hr-bar-bg { background: var(--card2); border-radius: 4px; height: 6px; overflow: hidden; }
    .hr-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }

    /* ── Training Plan ── */
    .plan-info {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
    }
    .plan-info-item .pi-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; }
    .plan-info-item .pi-val { font-size: 1rem; font-weight: 700; color: var(--text); }

    .plan-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.75rem;
    }
    .week-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
    }
    .week-card.peak { border-color: var(--orange); }
    .week-card.taper { border-color: var(--blue); }
    .week-card.race { border-color: var(--green); }
    .week-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    .week-num { font-weight: 700; font-size: 0.875rem; }
    .week-badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.15rem 0.5rem;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge-build { background: rgba(59,130,246,0.2); color: var(--blue); }
    .badge-peak { background: rgba(232,84,10,0.2); color: var(--orange); }
    .badge-taper { background: rgba(59,130,246,0.2); color: var(--blue); }
    .badge-race { background: rgba(46,204,113,0.2); color: var(--green); }

    .week-miles { font-size: 1.4rem; font-weight: 700; color: var(--orange); }
    .week-miles span { font-size: 0.75rem; color: var(--muted); font-weight: 400; }
    .week-runs { margin-top: 0.5rem; font-size: 0.8rem; color: var(--muted); line-height: 1.6; }

    .week-bar-wrap { margin-top: 0.75rem; }
    .week-bar-bg { background: var(--card2); border-radius: 4px; height: 4px; }
    .week-bar-fill { height: 100%; border-radius: 4px; background: var(--orange); transition: width 0.5s; }

    /* ── Calendar Button ── */
    .cal-bar {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .cal-bar-text .cal-title { font-weight: 700; font-size: 0.95rem; }
    .cal-bar-text .cal-sub { font-size: 0.8rem; color: var(--muted); margin-top: 0.15rem; }
    .btn-cal {
      background: #fff;
      color: #1a1d27;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1.25rem;
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .btn-cal:hover { opacity: 0.9; }
    .btn-cal:active { transform: scale(0.97); }
    .btn-cal img { width: 18px; height: 18px; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 1.2rem 1rem; }
      .container { padding: 1.25rem 1rem; }
      .form-card { padding: 1.25rem; }
      .pace-desc { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🏃</div>
  <div>
    <h1><span>Stride</span></h1>
    <p>Personalized marathon training plans, paces, and heart rate zones</p>
  </div>
</header>

<div class="container">

  <!-- ── INPUT FORM ── -->
  <div class="form-card">
    <h2>Your Profile</h2>
    <div class="form-grid">
      <div class="field">
        <label>Gender</label>
        <select id="gender">
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </div>
      <div class="field">
        <label>Age</label>
        <input type="number" id="age" placeholder="e.g. 30" min="10" max="100" />
      </div>
      <div class="field">
        <label>Height (inches)</label>
        <input type="number" id="height" placeholder="e.g. 70" min="48" max="96" />
      </div>
      <div class="field">
        <label>Weight (lbs)</label>
        <input type="number" id="weight" placeholder="e.g. 160" min="80" max="400" />
      </div>
      <div class="field">
        <label>Target Pace (min:sec / mile)</label>
        <div class="pace-row">
          <input type="number" id="pace-min" placeholder="9" min="4" max="20" style="width:80px" />
          <div class="pace-sep">:</div>
          <input type="number" id="pace-sec" placeholder="00" min="0" max="59" style="width:80px" />
        </div>
      </div>
      <div class="field">
        <label>Fitness Level</label>
        <select id="fitness">
          <option value="beginner">Beginner (first marathon)</option>
          <option value="intermediate">Intermediate (1–3 marathons)</option>
          <option value="advanced">Advanced (4+ marathons)</option>
        </select>
      </div>
      <div class="field">
        <label>Training Start Date</label>
        <input type="date" id="start-date" />
      </div>
    </div>
    <button class="btn" onclick="generate()">Generate My Plan →</button>
    <script>document.getElementById('start-date').value = new Date().toISOString().split('T')[0];</script>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <!-- ── RESULTS ── -->
  <div id="results">
    <div class="results-header">
      <h2>Your Training Plan</h2>
      <div class="badge" id="result-badge"></div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('pace')">Pace Calculator</div>
      <div class="tab" onclick="switchTab('plan')">18-Week Schedule</div>
      <div class="tab" onclick="switchTab('hr')">Heart Rate Zones</div>
    </div>

    <!-- ── PACE PANEL ── -->
    <div class="tab-panel active" id="tab-pace">
      <div class="stats-row" id="finish-stats"></div>
      <div class="section-title">Training Paces</div>
      <div class="pace-table" id="pace-table"></div>
    </div>

    <!-- ── PLAN PANEL ── -->
    <div class="tab-panel" id="tab-plan">
      <div class="cal-bar" id="cal-bar" style="display:none">
        <div class="cal-bar-text">
          <div class="cal-title">Add all runs to Google Calendar</div>
          <div class="cal-sub" id="cal-sub"></div>
        </div>
        <button class="btn-cal" onclick="downloadICS()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Download .ics for Google Calendar
        </button>
      </div>
      <div class="plan-info" id="plan-info"></div>
      <div class="plan-grid" id="plan-grid"></div>
    </div>

    <!-- ── HR PANEL ── -->
    <div class="tab-panel" id="tab-hr">
      <div class="stats-row" id="hr-stats"></div>
      <div class="section-title">Your 5 Training Zones</div>
      <div id="hr-zones"></div>
    </div>
  </div>

</div>

<script>
function fmtPace(totalSec) {
  const m = Math.floor(totalSec / 60);
  const s = Math.round(totalSec % 60);
  return `${m}:${String(s).padStart(2, '0')}`;
}

function fmtTime(totalMin) {
  const h = Math.floor(totalMin / 60);
  const m = Math.round(totalMin % 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['pace', 'plan', 'hr'][i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
}

let _planData = null;

function generate() {
  const gender    = document.getElementById('gender').value;
  const age       = parseInt(document.getElementById('age').value);
  const height    = parseFloat(document.getElementById('height').value);
  const weight    = parseFloat(document.getElementById('weight').value);
  const pMin      = parseInt(document.getElementById('pace-min').value);
  const pSec      = parseInt(document.getElementById('pace-sec').value) || 0;
  const fitness   = document.getElementById('fitness').value;
  const startDate = document.getElementById('start-date').value;

  const errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';

  if (!age || !height || !weight || !pMin) {
    errEl.textContent = 'Please fill in all fields.';
    errEl.style.display = 'block';
    return;
  }
  if (age < 10 || age > 100) { errEl.textContent = 'Age must be between 10 and 100.'; errEl.style.display = 'block'; return; }
  if (pMin < 4 || pMin > 20)  { errEl.textContent = 'Target pace must be between 4:00 and 20:00 per mile.'; errEl.style.display = 'block'; return; }

  const paceSec = pMin * 60 + pSec;
  _planData = { paceSec, fitness, startDate };

  document.getElementById('result-badge').textContent = fitness.charAt(0).toUpperCase() + fitness.slice(1);
  renderPace(paceSec, weight, height, gender);
  renderPlan(paceSec, fitness, startDate);
  renderHR(age, gender);

  document.getElementById('results').style.display = 'block';
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderPace(paceSec, weight, height, gender) {
  const marathonMin = (paceSec / 60) * 26.2188;
  const bmi = (weight / (height * height)) * 703;
  const speedMpm = 1609.34 / (paceSec);
  const vo2max = Math.max(20, Math.round(-4.6 + 0.182258 * speedMpm + 0.000104 * speedMpm * speedMpm));

  document.getElementById('finish-stats').innerHTML = `
    <div class="stat-card">
      <div class="label">Finish Time</div>
      <div class="value">${fmtTime(marathonMin)}</div>
      <div class="unit">marathon (26.2 mi)</div>
    </div>
    <div class="stat-card">
      <div class="label">Target Pace</div>
      <div class="value">${fmtPace(paceSec)}</div>
      <div class="unit">min : sec per mile</div>
    </div>
    <div class="stat-card">
      <div class="label">Est. VO₂max</div>
      <div class="value">${vo2max}</div>
      <div class="unit">mL/kg/min</div>
    </div>
    <div class="stat-card">
      <div class="label">BMI</div>
      <div class="value">${bmi.toFixed(1)}</div>
      <div class="unit">${bmi < 18.5 ? 'Underweight' : bmi < 25 ? 'Normal' : bmi < 30 ? 'Overweight' : 'Obese'}</div>
    </div>
  `;

  const paces = [
    { name: 'Easy / Recovery', color: '#2ecc71', desc: 'Conversational — most of your runs', offset: 90 },
    { name: 'Long Run',        color: '#3b82f6', desc: 'Slightly faster than easy, weekly long run', offset: 60 },
    { name: 'Marathon Race',   color: '#e8540a', desc: 'Your target race day pace', offset: 0 },
    { name: 'Tempo / Threshold', color: '#f59e0b', desc: 'Comfortably hard — 1 hr race pace', offset: -20 },
    { name: 'Interval / VO₂max', color: '#a855f7', desc: 'Hard effort — short repeats', offset: -45 },
    { name: 'Repetition', color: '#ef4444', desc: 'Very fast — speed work', offset: -75 },
  ];

  document.getElementById('pace-table').innerHTML = paces.map(p => `
    <div class="pace-row-item">
      <div class="pace-dot" style="background:${p.color}"></div>
      <div class="pace-name">${p.name}</div>
      <div class="pace-desc">${p.desc}</div>
      <div class="pace-val" style="color:${p.color}">${fmtPace(paceSec + p.offset)}<span style="color:var(--muted);font-size:0.75rem;font-weight:400">/mi</span></div>
    </div>
  `).join('');
}

function renderPlan(paceSec, fitness, startDate) {
  const bases = { beginner: 18, intermediate: 25, advanced: 32 };
  const peaks  = { beginner: 40, intermediate: 50, advanced: 60 };
  const base = bases[fitness];
  const peak = peaks[fitness];

  const weeks = [];
  for (let w = 1; w <= 18; w++) {
    let miles, phase, badge;
    if (w <= 3) {
      miles = base + (w - 1) * 2;
      phase = 'Build'; badge = 'badge-build';
    } else if (w <= 6) {
      miles = base + 6 + (w - 4) * 3;
      phase = 'Build'; badge = 'badge-build';
    } else if (w <= 9) {
      if (w === 9) { miles = base + 6; phase = 'Recovery'; badge = 'badge-build'; }
      else { miles = base + 9 + (w - 7) * 3; phase = 'Build'; badge = 'badge-build'; }
    } else if (w <= 13) {
      if (w === 13) { miles = base + 10; phase = 'Recovery'; badge = 'badge-build'; }
      else { miles = base + 12 + (w - 10) * 3; phase = 'Build'; badge = 'badge-build'; }
    } else if (w === 14) {
      miles = peak; phase = 'Peak'; badge = 'badge-peak';
    } else if (w === 15) {
      miles = Math.round(peak * 0.8); phase = 'Peak'; badge = 'badge-peak';
    } else if (w === 16) {
      miles = Math.round(peak * 0.65); phase = 'Taper'; badge = 'badge-taper';
    } else if (w === 17) {
      miles = Math.round(peak * 0.45); phase = 'Taper'; badge = 'badge-taper';
    } else {
      miles = 26; phase = 'Race Week!'; badge = 'badge-race';
    }
    miles = Math.min(miles, peak);
    const runs = buildRuns(miles, w, paceSec, fitness);
    weeks.push({ w, miles, phase, badge, runs });
  }

  const maxMiles = Math.max(...weeks.map(x => x.miles));

  const calBar = document.getElementById('cal-bar');
  const calSub = document.getElementById('cal-sub');
  if (startDate) {
    const sd = new Date(startDate + 'T00:00:00');
    const raceDate = new Date(sd);
    raceDate.setDate(sd.getDate() + 17 * 7);
    calSub.textContent = `${weeks.length * 5}+ events from ${sd.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})} → Race day ${raceDate.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;
  } else {
    calSub.textContent = 'Add a start date above to enable calendar export.';
  }
  calBar.style.display = 'flex';

  document.getElementById('plan-info').innerHTML = `
    <div class="plan-info-item"><div class="pi-label">Total Weeks</div><div class="pi-val">18 Weeks</div></div>
    <div class="plan-info-item"><div class="pi-label">Peak Mileage</div><div class="pi-val">${peak} miles/week</div></div>
    <div class="plan-info-item"><div class="pi-label">Runs per Week</div><div class="pi-val">${fitness === 'beginner' ? 4 : fitness === 'intermediate' ? 5 : 6}</div></div>
    <div class="plan-info-item"><div class="pi-label">Plan Level</div><div class="pi-val">${fitness.charAt(0).toUpperCase() + fitness.slice(1)}</div></div>
  `;

  document.getElementById('plan-grid').innerHTML = weeks.map(({ w, miles, phase, badge, runs }) => `
    <div class="week-card ${phase === 'Peak' ? 'peak' : phase === 'Taper' ? 'taper' : phase === 'Race Week!' ? 'race' : ''}">
      <div class="week-header">
        <div class="week-num">Week ${w}</div>
        <div class="week-badge ${badge}">${phase}</div>
      </div>
      <div class="week-miles">${miles} <span>miles total</span></div>
      <div class="week-runs">${runs}</div>
      <div class="week-bar-wrap">
        <div class="week-bar-bg">
          <div class="week-bar-fill" style="width:${(miles / maxMiles * 100).toFixed(1)}%"></div>
        </div>
      </div>
    </div>
  `).join('');
}

function buildRuns(totalMiles, week, paceSec, fitness) {
  const runsPerWeek = fitness === 'beginner' ? 4 : fitness === 'intermediate' ? 5 : 6;
  const longRun = Math.min(22, Math.round(totalMiles * 0.3));
  const tempoMiles = week <= 6 ? 4 : week <= 12 ? 6 : 5;
  const easyTotal = totalMiles - longRun - tempoMiles;
  const easyCount = runsPerWeek - 2;
  const easyMilesEach = Math.round(easyTotal / easyCount);

  if (week === 18) return '🏅 Race Day: 26.2 miles · Rest Mon–Sat · Race Sunday';

  const lines = [];
  lines.push(`🟢 Long run: ${longRun} mi @ easy pace`);
  if (week >= 4) lines.push(`🟡 Tempo: ${tempoMiles} mi @ threshold`);
  if (runsPerWeek >= 5) lines.push(`🟣 Intervals: 5×800m repeats`);
  for (let i = 0; i < easyCount; i++) {
    lines.push(`🔵 Easy run: ${Math.max(3, easyMilesEach)} mi`);
  }
  return lines.slice(0, runsPerWeek).join('<br>');
}

function icsDate(date, hour) {
  const d = new Date(date);
  d.setHours(hour, 0, 0, 0);
  return d.toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, '');
}

function icsEvent(uid, summary, description, date, durationHours) {
  const start = icsDate(date, 7);
  const endDate = new Date(date);
  endDate.setHours(7 + durationHours, 0, 0, 0);
  const end = endDate.toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, '');
  return [
    'BEGIN:VEVENT',
    `UID:${uid}@stride-training`,
    `DTSTAMP:${icsDate(new Date(), 0)}`,
    `DTSTART:${start}`,
    `DTEND:${end}`,
    `SUMMARY:${summary}`,
    `DESCRIPTION:${description}`,
    'END:VEVENT'
  ].join('\r\n');
}

function downloadICS() {
  if (!_planData) return;
  const { paceSec, fitness, startDate } = _planData;

  if (!startDate) {
    alert('Please enter a Training Start Date in the form above to export to calendar.');
    return;
  }

  const bases = { beginner: 18, intermediate: 25, advanced: 32 };
  const peaks  = { beginner: 40, intermediate: 50, advanced: 60 };
  const base = bases[fitness];
  const peak = peaks[fitness];
  const runsPerWeek = fitness === 'beginner' ? 4 : fitness === 'intermediate' ? 5 : 6;

  const dayOffsets = { 4: [0, 2, 4, 6], 5: [0, 1, 3, 5, 6], 6: [0, 1, 2, 4, 5, 6] };
  const offsets = dayOffsets[runsPerWeek];

  const events = [];
  const origin = new Date(startDate + 'T00:00:00');
  const dow = origin.getDay();
  const toMon = dow === 0 ? 1 : dow === 1 ? 0 : 8 - dow;
  origin.setDate(origin.getDate() + toMon);

  for (let w = 1; w <= 18; w++) {
    let miles;
    if (w <= 3)        miles = base + (w - 1) * 2;
    else if (w <= 6)   miles = base + 6 + (w - 4) * 3;
    else if (w <= 9)   miles = w === 9 ? base + 6 : base + 9 + (w - 7) * 3;
    else if (w <= 13)  miles = w === 13 ? base + 10 : base + 12 + (w - 10) * 3;
    else if (w === 14) miles = peak;
    else if (w === 15) miles = Math.round(peak * 0.8);
    else if (w === 16) miles = Math.round(peak * 0.65);
    else if (w === 17) miles = Math.round(peak * 0.45);
    else miles = 26;
    miles = Math.min(miles, peak);

    const weekStart = new Date(origin);
    weekStart.setDate(origin.getDate() + (w - 1) * 7);

    if (w === 18) {
      const raceDay = new Date(weekStart);
      raceDay.setDate(weekStart.getDate() + 6);
      events.push(icsEvent('w18-race', '🏅 Race Day — Marathon!',
        `26.2 miles. You trained for this. Run your pace of ${fmtPace(paceSec)}/mile. Good luck!`,
        raceDay, 5));
      continue;
    }

    const longRun = Math.min(22, Math.round(miles * 0.3));
    const tempoMiles = w <= 6 ? 4 : w <= 12 ? 6 : 5;
    const easyMiles = Math.max(3, Math.round((miles - longRun - tempoMiles) / (runsPerWeek - 2)));

    const runTypes = [
      { name: `🔵 Easy Run — ${easyMiles} mi`, desc: `Easy/recovery run at ${fmtPace(paceSec + 90)}/mile. Keep it conversational.`, dur: Math.ceil(easyMiles * paceSec / 3600) + 1 },
      { name: w >= 4 ? `🟡 Tempo Run — ${tempoMiles} mi` : `🔵 Easy Run — ${easyMiles} mi`, desc: w >= 4 ? `Threshold run at ${fmtPace(paceSec - 20)}/mile. Comfortably hard effort.` : `Easy run at ${fmtPace(paceSec + 90)}/mile.`, dur: 1 },
      runsPerWeek >= 5 ? { name: '🟣 Intervals — 5×800m', desc: `Speed work at ${fmtPace(paceSec - 45)}/mile pace. Warm up 1 mi, 5 repeats of 800m, cool down 1 mi.`, dur: 1 } : null,
      { name: `🔵 Easy Run — ${easyMiles} mi`, desc: `Easy run at ${fmtPace(paceSec + 90)}/mile.`, dur: Math.ceil(easyMiles * paceSec / 3600) + 1 },
      runsPerWeek >= 6 ? { name: `🔵 Easy Run — ${easyMiles} mi`, desc: `Easy run at ${fmtPace(paceSec + 90)}/mile.`, dur: Math.ceil(easyMiles * paceSec / 3600) + 1 } : null,
      { name: `🟢 Long Run — ${longRun} mi`, desc: `Long run at ${fmtPace(paceSec + 60)}/mile. Build your aerobic base. Hydrate well.`, dur: Math.ceil(longRun * (paceSec + 60) / 3600) + 1 },
    ].filter(Boolean).slice(0, runsPerWeek);

    offsets.slice(0, runsPerWeek).forEach((dayOff, i) => {
      const runDay = new Date(weekStart);
      runDay.setDate(weekStart.getDate() + dayOff);
      const run = runTypes[i];
      events.push(icsEvent(`w${w}-d${dayOff}`, `Week ${w}: ${run.name}`, run.desc, runDay, run.dur));
    });
  }

  const ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Stride//Marathon Training Planner//EN',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    'X-WR-CALNAME:Stride Marathon Training',
    'X-WR-CALDESC:Your 18-week marathon training plan from Stride',
    ...events,
    'END:VCALENDAR'
  ].join('\r\n');

  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'stride-marathon-plan.ics';
  a.click();
  URL.revokeObjectURL(url);
}

function renderHR(age, gender) {
  const maxHR = Math.round(208 - 0.7 * age);
  const restingHR = gender === 'female'
    ? Math.max(55, 72 - Math.floor(age / 10))
    : Math.max(50, 70 - Math.floor(age / 10));

  document.getElementById('hr-stats').innerHTML = `
    <div class="stat-card">
      <div class="label">Max Heart Rate</div>
      <div class="value">${maxHR}</div>
      <div class="unit">bpm (Tanaka formula)</div>
    </div>
    <div class="stat-card">
      <div class="label">Est. Resting HR</div>
      <div class="value">${restingHR}</div>
      <div class="unit">bpm average for age/gender</div>
    </div>
    <div class="stat-card">
      <div class="label">HR Reserve</div>
      <div class="value">${maxHR - restingHR}</div>
      <div class="unit">bpm (max − resting)</div>
    </div>
  `;

  const zones = [
    { n: 1, name: 'Recovery',  desc: 'Very easy — warm-up, cool-down, rest days', lo: 0.50, hi: 0.60, color: '#2ecc71' },
    { n: 2, name: 'Aerobic',   desc: 'Easy runs — builds aerobic base, fat burning', lo: 0.60, hi: 0.70, color: '#3b82f6' },
    { n: 3, name: 'Tempo',     desc: 'Moderate — marathon race pace zone', lo: 0.70, hi: 0.80, color: '#f59e0b' },
    { n: 4, name: 'Threshold', desc: 'Hard — lactate threshold, tempo runs', lo: 0.80, hi: 0.90, color: '#e8540a' },
    { n: 5, name: 'VO₂max',   desc: 'Very hard — interval training, short bursts', lo: 0.90, hi: 1.00, color: '#ef4444' },
  ];

  document.getElementById('hr-zones').innerHTML = zones.map(z => {
    const lo = Math.round(z.lo * maxHR);
    const hi = Math.round(z.hi * maxHR);
    return `
    <div class="hr-zone">
      <div class="hr-zone-header">
        <div class="hr-zone-number" style="background:${z.color}22;color:${z.color}">Z${z.n}</div>
        <div class="hr-zone-info">
          <div class="zone-name">${z.name}</div>
          <div class="zone-desc">${z.desc}</div>
        </div>
        <div class="hr-zone-range">
          <div class="bpm" style="color:${z.color}">${lo}–${hi} <span style="font-size:0.7rem;color:var(--muted)">bpm</span></div>
          <div class="pct">${Math.round(z.lo * 100)}–${Math.round(z.hi * 100)}% max HR</div>
        </div>
      </div>
      <div class="hr-bar-wrap">
        <div class="hr-bar-bg">
          <div class="hr-bar-fill" style="width:${z.hi * 100}%;background:${z.color}"></div>
        </div>
      </div>
    </div>
  `}).join('');
}
